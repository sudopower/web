# Deploy SUDOPOWER website and blog to GitHub Pages
name: Deploy SUDOPOWER Site and Blog

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy job
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Hugo (for blog)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo Blog
        run: |
          cd blog
          hugo --gc --minify --baseURL "https://sudopower.com/"

      - name: Prepare deployment
        run: |
          mkdir -p _deploy
          # Copy static site files (about, contact, tools, css, js, assets, tools dir, CNAME)
          cp -r about css js assets tools _deploy/
          cp contact.html tools.html bq.html CNAME _deploy/
          # Overlay Hugo output at root (provides index.html, posts, etc.)
          cp -r blog/public/* _deploy/
          # Clean up
          rm -rf .github/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
