<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="blog-body">

  <header class="blog-header">
    <div class="blog-container">
      <nav class="blog-nav">
        <a href="{{ site.BaseURL }}" class="blog-logo"><span class="logo-slash">//</span>sudopower</a>
        <div class="blog-nav-links">
          {{ range site.Menus.main }}
          <a href="{{ .URL }}" class="blog-nav-link">/{{ .Name | lower }}</a>
          {{ end }}
        </div>
      </nav>
    </div>
  </header>

  <main class="blog-main">
    <div class="blog-container">
      {{ block "main" . }}{{ end }}
    </div>
  </main>

  <footer class="blog-footer">
    <div class="blog-container">
      <p>&copy; {{ now.Format "2006" }} SUDOPOWER</p>
    </div>
  </footer>

</body>
</html>
