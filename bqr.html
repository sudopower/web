  async function sha256(s){
    var b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
  }
  function reveal(){
    var html = new TextDecoder().decode(Uint8Array.from(atob(DATA), function(c){return c.charCodeAt(0);}));
    var app = document.getElementById('app');
    app.innerHTML = html;
    app.style.display = 'block';
    var g = document.getElementById('gate');
    if (g) g.remove();
    document.body.style.background = '';
  }
  document.getElementById('gform').addEventListener('submit', async function(ev){
    ev.preventDefault();
    var v = document.getElementById('pw').value;
    try {
      var h = await sha256(v);
      if (h === HASH) { try { sessionStorage.setItem('bqok','1'); } catch(e){} reveal(); }
      else { document.getElementById('err').textContent = 'Incorrect passphrase.'; }
    } catch(e) { document.getElementById('err').textContent = 'This browser blocks the check. Try another.'; }
  });
  try { if (sessionStorage.getItem('bqok') === '1') reveal(); } catch(e){}
</script>
